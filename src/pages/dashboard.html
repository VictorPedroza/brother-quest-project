<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrotherQuest — Dashboard</title>

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/components/dashboard.css" />
  </head>
  <body>
    <section class="screen-container flex-center">
      <div class="dashboard-box text-center">
        <div class="dashboard-header">
          <h2 class="dashboard-title" id="dashboard-title">Olá!</h2>
          <button class="btn-logout" id="logout-btn">Sair</button>
        </div>

        <div class="avatar dashboard-avatar" id="dashboard-avatar">
          <span class="avatar-emoji" id="dashboard-avatar-emoji"></span>
        </div>

        <div class="dashboard-stats">
          <div class="dashboard-stat-item">
            <span>Nível</span>
            <span id="dashboard-level"></span>
          </div>
          <div class="dashboard-stat-item">
            <span>XP</span>
            <span id="dashboard-xp"></span>
          </div>
          <div class="dashboard-stat-item">
            <span>Sequência</span>
            <span id="dashboard-streak"></span>
          </div>
        </div>
      </div>
    </section>
    <script type="module" src="../js/dashboard.page.js"></script>
  </body>
</html>
