<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrotherQuest — Escolher perfil</title>
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/components/profile-card.css" />
  </head>
  <body>
    <section class="screen-container flex-center">
      <div class="content-wrapper text-center">
        <div>
          <span class="gamification-tag">
            <svg
              class="icon-blue"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4Z" />
              <path
                d="M17 5h3a1 1 0 0 1 1 1v1a4 4 0 0 1-4 4M7 5H4a1 1 0 0 0-1 1v1a4 4 0 0 0 4 4"
              />
            </svg>
            <span>Gamificação Diária</span>
          </span>

          <h1 class="main-title">
            Brother<span class="text-blue">Quest</span>
          </h1>
          <p class="subtitle">
            Escolha seu perfil e comece a transformar suas rotinas diárias em
            conquistas épicas.
          </p>
        </div>

        <div class="users-indicator">
          <svg
            class="icon-small"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          <span>Quem está jogando hoje?</span>
        </div>

        <div class="profile-grid" id="profile-grid"></div>
      </div>
    </section>
    <script type="module" src="./js/index.page.js"></script>
  </body>
</html>
